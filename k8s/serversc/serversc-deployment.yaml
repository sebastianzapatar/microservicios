apiVersion: apps/v1
kind: Deployment
metadata:
  name: serversc
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serversc
  template:
    metadata:
      labels:
        app: serversc
    spec:
      containers:
        - name: serversc
          image: serversc:latest
          imagePullPolicy: Never   # uses locally built image
          ports:
            - containerPort: 8888
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 40
            periodSeconds: 15
